<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Atlas Financeiro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #27ae60; }
        .resumo { display: flex; justify-content: space-between; margin-bottom: 20px; background: #e8f5e9; padding: 15px; border-radius: 8px; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #219150; }
        ul { list-style: none; padding: 0; }
        li { background: #fff; border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-excluir { background: #e74c3c; width: auto; padding: 5px 10px; margin: 0; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Atlas Financeiro</h1>
    <div class="resumo">
        <span>Saldo Atual:</span>
        <span id="saldo-total">R$ 0,00</span>
    </div>
    <form id="form-transacao">
        <input type="text" id="descricao" placeholder="Descrição" required>
        <input type="number" id="valor" step="0.01" placeholder="Valor" required>
        <select id="tipo"><option value="Receita">Receita</option><option value="Despesa">Despesa</option></select>
        <select id="categoria"><option value="Alimentação">Alimentação</option><option value="Salário">Salário</option></select>
        <select id="forma_pagamento"><option value="Pix">Pix</option><option value="Dinheiro">Dinheiro</option></select>
        <button type="submit">Adicionar Transação</button>
    </form>
    <ul id="lista-transacoes"></ul>
</div>

<script>
    window.addEventListener('load', () => {
        window.supabaseClient = (typeof supabase !== 'undefined') ? supabase.createClient('https://syocucffhbkfwqgrlfzo.supabase.co', 'sb_publishable_yWBL_BsIhEjg0JvTZOWong_PTgE7psb') : supabaseJs.createClient('https://syocucffhbkfwqgrlfzo.supabase.co', 'sb_publishable_yWBL_BsIhEjg0JvTZOWong_PTgE7psb');

        async function carregar() {
            const { data } = await window.supabaseClient.from('transacoes').select('*').order('id', { ascending: false });
            const lista = document.getElementById('lista-transacoes');
            lista.innerHTML = '';
            let total = 0;
            data?.forEach(t => {
                const v = parseFloat(t.valor);
                total += (t.tipo === 'Receita' ? v : -v);
                lista.innerHTML += `<li>
                    <span>${t.descricao} (R$ ${v.toFixed(2)})</span>
                    <button class="btn-excluir" onclick="deletar(${t.id})">Excluir</button>
                </li>`;
            });
            document.getElementById('saldo-total').textContent = `R$ ${total.toFixed(2)}`;
        }

        // Função de deletar vinculada ao objeto global para o HTML achar
        window.deletar = async (id) => {
            await window.supabaseClient.from('transacoes').delete().eq('id', id);
            carregar();
        };

        document.getElementById('form-transacao').onsubmit = async (e) => {
            e.preventDefault();
            await window.supabaseClient.from('transacoes').insert([{
                descricao: document.getElementById('descricao').value,
                valor: document.getElementById('valor').value,
                tipo: document.getElementById('tipo').value,
                categoria: document.getElementById('categoria').value,
                forma_pagamento: document.getElementById('forma_pagamento').value
            }]);
            document.getElementById('form-transacao').reset();
            carregar();
        };
        carregar();
    });
</script>
</body>
</html>
