<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Atlas Financeiro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #ffffff; --accent: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: var(--card); padding: 25px; border-radius: 12px; }
        input, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #333; background: #2c2c2c; color: white; }
        button { background-color: var(--accent); border: none; cursor: pointer; font-weight: bold; }
        #app-content { display: none; }
    </style>
</head>
<body>

<div id="auth-screen" class="container">
    <h2>Acesso Atlas</h2>
    <input type="password" id="senha-usuario" placeholder="Digite a senha">
    <button id="btn-acesso">Entrar</button>
</div>

<div id="app-content" class="container">
    <h1>Atlas Financeiro</h1>
    <div id="resumo-box">Saldo Atual: <strong id="valor-total">R$ 0,00</strong></div>
    <form id="form-novo">
        <input type="text" id="desc" placeholder="Descrição" required>
        <input type="number" id="val" step="0.01" placeholder="Valor" required>
        <button type="submit">Salvar Dados</button>
    </form>
    <ul id="lista-dados"></ul>
</div>

<script>
    // Usamos um objeto totalmente novo para evitar conflito com o 'supabase' antigo
    const meuBanco = supabaseJs.createClient(
        'https://syocucffhbkfwqgrlfzo.supabase.co', 
        'sb_publishable_yWBL_BsIhEjg0JvTZOWong_PTgE7psb'
    );

    document.getElementById('btn-acesso').onclick = async () => {
        if (document.getElementById('senha-usuario').value === '1409') {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            await buscarNoBanco();
        } else { alert('Senha incorreta!'); }
    };

    async function buscarNoBanco() {
        const { data } = await meuBanco.from('transacoes').select('*');
        const lista = document.getElementById('lista-dados');
        lista.innerHTML = '';
        data?.forEach(t => {
            lista.innerHTML += `<li>${t.descricao} - R$ ${parseFloat(t.valor).toFixed(2)}</li>`;
        });
    }

    document.getElementById('form-novo').onsubmit = async (e) => {
        e.preventDefault();
        await meuBanco.from('transacoes').insert([{
            descricao: document.getElementById('desc').value,
            valor: document.getElementById('val').value
        }]);
        buscarNoBanco();
    };
</script>
</body>
</html>
